name: Lockdown External Pull Requests

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close-external-pr:
    if: github.event.pull_request.user.login != 'sora32127'
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close PR
        uses: actions/github-script@v7
        with:
          script: |
            const message = [
              'ご投稿ありがとうございます。',
              '',
              '本リポジトリは現在、リポジトリオーナー（@sora32127）以外からのPull Requestは受け付けておりません。また、Issueでの提案・バグ報告も受け付けていません。',
              'お手数ですが、改善提案やバグ報告は [Discord](https://discord.com/invite/sQehNGTnSg) の #エンジニアリング議論 チャンネル、または管理人の [X DM](https://x.com/messages/compose?recipient_id=1249916069344473088) までお願いいたします。',
              '',
              '方針の詳細は [README](https://github.com/${{ github.repository }}#readme) をご覧ください。',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed',
            });

            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              lock_reason: 'resolved',
            });
