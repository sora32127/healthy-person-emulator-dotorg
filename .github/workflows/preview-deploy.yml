name: Preview Deploy
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '.agent/**'
      - '.claude/**'
      - 'docs/**'
      - 'terraform/**'

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      - name: Seed migration state for already-applied changes
        run: >-
          npx wrangler d1 execute healthy-person-emulator-db-preview --remote
          --config wrangler.preview.toml
          --command "INSERT INTO d1_migrations (name) SELECT '0002_add_sns_columns.sql' WHERE (SELECT count(*) FROM pragma_table_info('dim_posts') WHERE name='is_sns_pickuped') > 0 AND NOT EXISTS (SELECT 1 FROM d1_migrations WHERE name='0002_add_sns_columns.sql');"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply healthy-person-emulator-db-preview --remote --config wrangler.preview.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to preview
        run: pnpm deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment PR with preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const body = `### Preview Deployment\nDeployed to https://preview.healthy-person-emulator.org\nCommit: \`${context.sha.substring(0, 7)}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('### Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  a11y:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run a11y tests against preview
        id: a11y-test
        continue-on-error: true
        run: pnpm test:a11y
        env:
          BASE_URL: https://preview.healthy-person-emulator.org
      - name: Comment PR with a11y results
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'a11y-report.json';
            let body = '### Accessibility Check\n\n';

            if (!fs.existsSync(reportPath)) {
              body += '⚠️ レポートファイルが生成されませんでした。\n';
            } else {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
              const withViolations = report.filter(r => r.violations.length > 0);

              if (withViolations.length === 0) {
                body += '✅ すべてのページでアクセシビリティ違反は検出されませんでした。\n\n';
                body += `チェック対象: ${report.length} ページ（light/dark）`;
              } else {
                body += `❌ ${withViolations.length} / ${report.length} ページで違反が検出されました。\n\n`;
                for (const entry of withViolations) {
                  body += `<details><summary><code>${entry.route}</code> [${entry.colorScheme}] — ${entry.violations.length} 件</summary>\n\n`;
                  for (const v of entry.violations) {
                    body += `- **[${v.impact}] ${v.id}**: ${v.description}\n`;
                    for (const node of v.nodes.slice(0, 3)) {
                      body += `  - \`${node.substring(0, 100)}\`\n`;
                    }
                    if (v.nodes.length > 3) {
                      body += `  - _...他 ${v.nodes.length - 3} 件_\n`;
                    }
                  }
                  body += '\n</details>\n\n';
                }
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('### Accessibility Check'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
      - name: Fail if a11y violations found
        if: steps.a11y-test.outcome == 'failure'
        run: exit 1
