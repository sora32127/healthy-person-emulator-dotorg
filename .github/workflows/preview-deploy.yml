name: Preview Deploy
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '.agent/**'
      - '.claude/**'
      - 'docs/**'
      - 'terraform/**'

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      - name: Seed migration state for already-applied changes
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          command: >-
            d1 execute healthy-person-emulator-db-preview --remote
            --config wrangler.preview.toml
            --command "INSERT INTO d1_migrations (name) SELECT '0002_add_sns_columns.sql' WHERE (SELECT count(*) FROM pragma_table_info('dim_posts') WHERE name='is_sns_pickuped') > 0 AND NOT EXISTS (SELECT 1 FROM d1_migrations WHERE name='0002_add_sns_columns.sql');"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          command: d1 migrations apply healthy-person-emulator-db-preview --remote --config wrangler.preview.toml
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to preview
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: '4'
          command: deploy --config wrangler.preview.toml
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Preview Deployment\nDeployed to https://preview.healthy-person-emulator.org\nCommit: \`${context.sha.substring(0, 7)}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('### Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
