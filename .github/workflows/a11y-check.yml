name: Accessibility Check
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '.agent/**'
      - '.claude/**'
      - 'docs/**'
      - 'terraform/**'

concurrency:
  group: a11y-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  a11y:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Wait for preview deployment
        run: |
          echo "Waiting for preview to be ready..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w '%{http_code}' https://preview.healthy-person-emulator.org | grep -q '200'; then
              echo "Preview is ready!"
              break
            fi
            echo "Attempt $i/60 - waiting 10s..."
            sleep 10
          done
        timeout-minutes: 12
      - name: Run a11y tests against preview
        id: a11y-test
        continue-on-error: true
        run: pnpm test:a11y
        env:
          BASE_URL: https://preview.healthy-person-emulator.org
      - name: Comment PR with a11y results
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = 'a11y-results';
            let body = '### Accessibility Check\n\n';

            if (!fs.existsSync(resultsDir)) {
              body += '⚠️ レポートが生成されませんでした。\n';
            } else {
              const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
              const report = files.map(f => JSON.parse(fs.readFileSync(path.join(resultsDir, f), 'utf-8')));
              const withViolations = report.filter(r => r.violations.length > 0);

              if (withViolations.length === 0) {
                body += '✅ すべてのページでアクセシビリティ違反は検出されませんでした。\n\n';
                body += `チェック対象: ${report.length} ページ（light/dark）`;
              } else {
                body += `❌ ${withViolations.length} / ${report.length} ページで違反が検出されました。\n\n`;
                for (const entry of withViolations) {
                  body += `<details><summary><code>${entry.route}</code> [${entry.colorScheme}] — ${entry.violations.length} 件</summary>\n\n`;
                  for (const v of entry.violations) {
                    body += `- **[${v.impact}] ${v.id}**: ${v.description}\n`;
                    for (const node of v.nodes.slice(0, 3)) {
                      body += `  - \`${node.substring(0, 100)}\`\n`;
                    }
                    if (v.nodes.length > 3) {
                      body += `  - _...他 ${v.nodes.length - 3} 件_\n`;
                    }
                  }
                  body += '\n</details>\n\n';
                }
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('### Accessibility Check'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
      - name: Fail if a11y violations found
        if: steps.a11y-test.outcome == 'failure'
        run: exit 1
