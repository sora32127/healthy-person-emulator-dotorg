name: Lockdown External Issues

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  close-external-issue:
    if: github.event.issue.user.login != 'sora32127'
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const message = [
              'ご投稿ありがとうございます。',
              '',
              '本リポジトリは現在、リポジトリオーナー（@sora32127）以外からのIssueおよびPull Requestは受け付けておりません。',
              'お手数ですが、バグ報告や改善提案は [Discord](https://discord.com/invite/sQehNGTnSg) の #エンジニアリング議論 チャンネル、または管理人の [X DM](https://x.com/messages/compose?recipient_id=1249916069344473088) までお願いいたします。',
              '',
              '方針の詳細は [README](https://github.com/${{ github.repository }}#readme) をご覧ください。',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });

            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              lock_reason: 'resolved',
            });
