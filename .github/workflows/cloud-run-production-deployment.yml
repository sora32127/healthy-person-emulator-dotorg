name: Production Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Get PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].head.sha')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/793318155385/locations/global/workloadIdentityPools/github-actions-pool-3/providers/github-actions-provider-3'
          service_account: 'github-actions@healthy-person-emulator.iam.gserviceaccount.com'

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy healthy-person-emulator-dotorg \
            --image asia-northeast1-docker.pkg.dev/healthy-person-emulator/cloud-run-source-deploy/preview-healthy-person-emulator-dotorg:${{ steps.pr.outputs.head_sha }} \
            --region=asia-northeast1 \
            --concurrency=1 \
            --memory=2Gi \
            --cpu=2 \
            --timeout=300 \
            --project=healthy-person-emulator \
            --service-account=github-actions@healthy-person-emulator.iam.gserviceaccount.com
